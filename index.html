<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sargaroth RPG — Аркуш персонажа</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="sheet">
      <h1>Sargaroth RPG</h1>

      <section class="card top-grid">
        <label>Ім'я <input id="name" /></label>
        <label>Раса <input id="race" /></label>
        <label>Архетип <input id="archetype" /></label>
      </section>

      <section class="card stats-grid" id="statsGrid"></section>

      <section class="card resources-grid">
        <label>HP <input id="hp" type="number" min="0" /></label>
        <label>AP <input id="ap" type="number" min="0" readonly /></label>
        <label>BP <input id="bp" type="number" min="0" readonly /></label>
        <label>TP <input id="tp" type="number" min="0" readonly /></label>
        <label>MP <input id="mp" type="number" min="0" readonly /></label>
        <label>MP атрибут
          <select id="mpStat"><option value="INT">INT</option><option value="WIL">WIL</option></select>
        </label>
      </section>

      <section class="card">
        <h2>Навички</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th><th>Навичка</th><th>Базовий атрибут</th><th>База</th><th>SP</th><th>Разом</th>
              </tr>
            </thead>
            <tbody id="skillsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>Озброєння</h2>
        <textarea id="weapons" rows="4" placeholder="Назва / тип / шкода / мод / примітка"></textarea>
      </section>

      <section class="card">
        <h2>Броня</h2>
        <textarea id="armor" rows="4" placeholder="Назва / част. тіла / захист / примітка"></textarea>
      </section>

      <section class="card">
        <h2>Інвентар</h2>
        <textarea id="inventory" rows="4" placeholder="Спорядження, предмети, ресурси..."></textarea>
      </section>

      <section class="toolbar card">
        <button id="newCharacter">Новий</button>
        <button id="saveCharacter">Зберегти</button>
        <button id="deleteCharacter" class="danger">Видалити</button>
        <label>Обраний персонаж
          <select id="savedCharacters"></select>
        </label>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
